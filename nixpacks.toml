# Força o Nixpacks a tratar este projeto como PHP/Laravel.
# Sem isto, o package.json (Vite) faz o Railway detectar como app Node,
# e nenhum processo PHP fica escutando na $PORT -> 502 "connection refused".
providers = ["php"]

# Start: garante o arquivo sqlite, roda as migrations e sobe o servidor
# ligado em 0.0.0.0:$PORT (a porta que o Railway roteia).
# PHP_CLI_SERVER_WORKERS permite atender requisições em paralelo
# (o app dispara várias chamadas /api ao abrir).
[start]
cmd = "mkdir -p database && touch database/database.sqlite && php artisan migrate --force && PHP_CLI_SERVER_WORKERS=4 php artisan serve --host 0.0.0.0 --port ${PORT:-8000}"
